<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Hardware Cheat Sheet</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23161616'/%3E%3Crect x='4' y='14' width='3' height='10' rx='1.5' fill='%23e67e22'/%3E%3Crect x='9' y='10' width='3' height='14' rx='1.5' fill='%23e67e22'/%3E%3Crect x='14' y='6' width='3' height='18' rx='1.5' fill='%23e67e22'/%3E%3Crect x='19' y='10' width='3' height='14' rx='1.5' fill='%23e67e22'/%3E%3Crect x='24' y='14' width='3' height='10' rx='1.5' fill='%23e67e22'/%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surf:#161616;--surf2:#1e1e1e;--surf3:#252525;
  --border:#2a2a2a;--text:#e0e0e0;--muted:#777;--radius:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;height:100dvh}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.6;display:flex;flex-direction:column;overflow:hidden}
header{
  display:flex;align-items:center;gap:12px;padding:0 16px;
  background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0;
  min-height:48px;flex-wrap:wrap;
}
header h1{font-size:15px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
header p{color:var(--muted);font-size:11px;white-space:nowrap}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
#search{
  padding:7px 12px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--surf2);color:var(--text);
  font-size:13px;width:200px;-webkit-appearance:none;
}
#search:focus{outline:none;border-color:#555}
/* ── Layout ── */
.layout{display:flex;flex:1;overflow:hidden;flex-direction:row}
/* ── Desktop sidebar ── */
.sidebar{
  width:195px;flex-shrink:0;overflow-y:auto;overflow-x:hidden;
  background:var(--surf);border-right:1px solid var(--border);padding:6px 0;
}
.tab-btn{
  display:block;width:100%;text-align:left;background:none;
  border:none;border-left:3px solid transparent;
  padding:9px 14px;cursor:pointer;color:var(--muted);transition:all .12s;
  -webkit-tap-highlight-color:transparent;
}
.tab-btn:hover{background:var(--surf2);color:var(--text)}
.tab-btn.active{border-left-color:var(--c);background:var(--surf2);color:var(--text)}
.tab-name{display:block;font-weight:600;font-size:12px}
.tab-cat{display:block;font-size:10px;color:var(--muted);margin-top:1px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 20px}
.panel{display:none}
.panel.active{display:block}
/* ── Mobile: top scrolling nav ── */
@media(max-width:700px){
  html,body{height:100dvh;overflow:hidden}
  body{font-size:14px}
  header{min-height:44px;padding:0 12px;gap:8px;flex-wrap:nowrap}
  header p{display:none}
  header h1{font-size:14px}
  .header-right{margin-left:auto}
  #search{width:140px;font-size:14px;padding:6px 10px}
  .layout{flex-direction:column}
  .sidebar{
    width:100%;height:auto;max-height:none;
    border-right:none;border-bottom:1px solid var(--border);
    display:flex;flex-direction:row;
    overflow-x:auto;overflow-y:hidden;
    padding:0;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
    flex-shrink:0;
  }
  .sidebar::-webkit-scrollbar{display:none}
  .tab-btn{
    display:inline-flex;flex-direction:column;align-items:center;
    width:auto;min-width:64px;flex-shrink:0;
    border-left:none;border-bottom:3px solid transparent;
    padding:14px 14px 10px;
    text-align:center;white-space:nowrap;
  }
  .tab-btn.active{
    border-left-color:transparent;border-bottom-color:var(--c);
    background:var(--surf2);
  }
  .tab-cat{display:none}
  .tab-name{font-size:11px}
  .content{padding:12px 12px 24px;-webkit-overflow-scrolling:touch}
}
.ph{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px;background:var(--surf);border-radius:var(--radius);
  margin-bottom:18px;border-left:4px solid var(--c);
}
.ph h2{font-size:18px;font-weight:700;margin-bottom:4px}
.badge{
  display:inline-block;padding:2px 9px;border-radius:20px;
  font-size:10px;font-weight:700;color:#fff;background:var(--c);margin-right:6px;
}
.usecase{color:var(--muted);font-size:11px}
.overview{
  background:var(--surf2);border-radius:var(--radius);
  padding:10px 14px;margin-bottom:18px;font-style:italic;
  color:#bbb;border-left:3px solid var(--c);font-size:12px;
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
h3{
  font-size:10px;text-transform:uppercase;letter-spacing:.8px;
  color:var(--muted);margin-bottom:8px;padding-bottom:5px;
  border-bottom:1px solid var(--border);
}
ol.wf{padding-left:16px}
ol.wf li,ul.tips li{margin-bottom:6px;font-size:12px}
ul.tips{padding-left:16px}
ul.tips li::marker{color:var(--c)}
.st-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:22px}
.st{width:100%;border-collapse:collapse;font-size:12px;min-width:360px}
.st th{
  text-align:left;padding:7px 10px;background:var(--surf);
  color:var(--muted);font-size:10px;text-transform:uppercase;
  letter-spacing:.5px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1;
}
.st td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.st tr:hover td{background:var(--surf2)}
.st tr.hidden{display:none}
kbd{
  font-family:'SF Mono','Fira Code',monospace;
  font-size:10px;font-weight:600;
  color:#c9e2ff;
  background:#1a2a3a;
  border:1px solid #4a7aaa;
  border-bottom:2px solid #2a5078;
  border-radius:4px;
  padding:1px 5px 2px;
  white-space:nowrap;
  display:inline-block;
  line-height:1.4;
  box-shadow:0 1px 0 #0a1a2a,inset 0 1px 0 rgba(255,255,255,.07);
}
code{
  font-family:'SF Mono','Fira Code',monospace;
  font-size:10px;font-weight:600;
  color: #42709f;
  padding:1px 5px 2px;
  white-space:nowrap;
  display:inline-block;
  line-height:1.4;
}
@media(max-width:700px){
  .st-wrap{overflow-x:unset}
  .st{font-size:13px;min-width:unset}
  .st thead{display:none}
  .st tr{display:block;border-bottom:1px solid var(--border);padding:6px 0}
  .st tr.cat-label{display:block;padding:0}
  .st tr.hidden{display:none}
  .st td{display:block;border:none;padding:2px 10px}
  .st td:first-child{color:#7eb8f7;font-family:'SF Mono','Fira Code',monospace;font-size:12px;padding-top:6px}
  .st td:last-child{color:var(--text);font-size:13px;padding-bottom:6px}
  .ph{flex-direction:column;gap:8px}
  .ph h2{font-size:16px}
}
.cat-label td{
  font-size:10px;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);padding:10px 10px 3px;font-weight:700;
  border-top:1px solid var(--border);background:var(--bg);
}
.star{color:gold;font-size:10px;margin-left:4px;vertical-align:middle}
.led-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:16px}
.led-table td{padding:4px 8px;border-bottom:1px solid var(--border)}
.led-table tr:hover td{background:var(--surf2)}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
.cs-wrap{overflow-x:auto;margin-bottom:22px}
.cs-table{border-collapse:collapse;font-size:10px;white-space:nowrap;min-width:100%}
.cs-table th{text-align:center;padding:4px 5px;background:var(--surf);color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}
.cs-table th.lft{text-align:left}
.cs-table td{padding:3px 5px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
.cs-table tr:hover td{background:var(--surf2)}
.cs-table .cn{color:var(--c);font-weight:700;font-size:11px;text-align:right;width:28px}
.cs-table .cg{color:#aaa;text-align:left;min-width:80px}
.cs-table .cm{color:#667;text-align:left;font-size:9px;min-width:110px;font-style:italic}
.cs-table .cc{color:var(--text);min-width:52px}
.cs-table .ce{color:#444;font-size:9px}
/* ── Theory Panel ──────────────────────────────────────────────────── */
.th-ctrl{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:14px;padding:10px 14px;background:var(--surf);border-radius:var(--radius);border:1px solid var(--border)}
.th-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.th-rb{padding:3px 7px;border:1px solid var(--border);border-radius:4px;background:var(--surf2);color:var(--muted);cursor:pointer;font-size:11px;font-family:'SF Mono','Fira Code',monospace;transition:all .1s}
.th-rb.on{background:var(--c);color:#fff;border-color:var(--c)}
.th-rb:hover:not(.on){background:var(--surf3);color:var(--text)}
.th-sel{padding:5px 8px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surf2);color:var(--text);font-size:12px}
.th-sel:focus{outline:none;border-color:var(--c)}
.th-piano-outer{overflow-x:auto;margin-bottom:12px;padding:4px 0}
.th-np{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;align-items:center}
.th-pill{padding:2px 8px;border-radius:12px;font-size:11px;font-family:'SF Mono','Fira Code',monospace;background:var(--surf2);border:1px solid var(--border);color:var(--muted)}
.th-pill.sc{background:var(--surf3);color:var(--text);border-color:#444}
.th-pill.rt{background:var(--c);color:#fff;border-color:var(--c);font-weight:700;box-shadow:0 0 0 2px var(--c),0 0 0 3px var(--bg)}
.th-g2{display:grid;grid-template-columns:1fr 226px;gap:16px;margin-bottom:16px}
@media(max-width:700px){.th-g2{grid-template-columns:1fr}}
.th-card{background:var(--surf);border-radius:var(--radius);padding:12px 14px;border:1px solid var(--border);margin-bottom:14px}
.th-card h4{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.cht{width:100%;border-collapse:collapse;font-size:11px}
.cht th{text-align:left;padding:4px 6px;color:var(--muted);font-size:9px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.cht td{padding:3px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.cht tr:hover td{background:var(--surf2)}
.cht tr.th-hdr td{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--bg);padding:8px 6px 3px;font-weight:700;border-top:1px solid var(--border)}
.ch-n{color:var(--c);font-weight:700;font-family:'SF Mono','Fira Code',monospace;font-size:12px}
.pg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:10px;margin-bottom:20px}
.pg-card{background:var(--surf);border-radius:var(--radius);padding:10px 12px;border:1px solid var(--border);border-left:3px solid var(--c)}
.pg-name{font-size:11px;color:var(--text);font-weight:600;margin-bottom:3px}
.pg-chords{font-family:'SF Mono','Fira Code',monospace;font-size:12px;color:var(--c);margin:4px 0;letter-spacing:.2px}
.pg-meta{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.pg-desc{font-size:10px;color:#888;margin-top:2px}
.fm-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:20px}
.fm-tbl th{text-align:left;padding:6px 8px;background:var(--surf);color:var(--muted);font-size:9px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.fm-tbl td{padding:5px 8px;border-bottom:1px solid var(--border)}
.fm-tbl tr:hover td{background:var(--surf2)}
.fm-prog{font-family:'SF Mono','Fira Code',monospace;color:var(--c);font-size:11px}
.ns-input{width:100%;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surf2);color:var(--text);font-size:13px;font-family:'SF Mono','Fira Code',monospace;margin-bottom:10px;box-sizing:border-box}
.ns-input:focus{outline:none;border-color:var(--c)}
.ns-tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-family:'SF Mono','Fira Code',monospace;background:var(--surf3);border:1px solid var(--border);color:var(--text);margin:2px 3px 2px 0}
.ns-tag.active{background:var(--c);border-color:var(--c);color:#fff}
.ns-row{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.ns-row:last-child{border-bottom:none}
.ns-row.exact .ns-name{color:var(--c)}
.ns-name{font-weight:700;min-width:160px}
.ns-notes{font-family:'SF Mono','Fira Code',monospace;font-size:10px;color:var(--muted);flex:1;flex-wrap:wrap}
.ns-badge{font-size:9px;padding:1px 5px;border-radius:8px;background:var(--surf3);color:var(--muted);border:1px solid var(--border);margin-left:4px;white-space:nowrap}
.ns-badge.exact{background:var(--c);color:#fff;border-color:var(--c)}
@media print{
  .sidebar,#search,#dev-filter{display:none}
  body{display:block;height:auto;overflow:auto}
  .layout{height:auto;display:block}
  .content{padding:0}
  .panel{display:block!important;page-break-after:always}
}
</style>
</head>
<body>
<header>
  <div><h1>Music Hardware Cheat Sheet</h1><p>Workflows &amp; shortcuts</p></div>
  <div class="header-right">
    <input id="search" type="text" placeholder="Search…" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
</header>
<div class="layout">
<nav class="sidebar" id="sidebar"></nav>
<main class="content" id="content"></main>
</div>

wing"}, {"cat": "Sequencer", "combo": "[SHIFT] + [F (LAST)]", "action": "Set last step (pattern length)"}, {"cat": "Sequencer", "combo": "[SHIFT] + [G (CLEAR)]", "action": "Initialize pattern (or just the selected step if one is selected)"}, {"cat": "Sequencer", "combo": "Hold [PATTERN] + turn [TEMPO/VALUE]", "action": "Change beats per measure (1-4, 1-3, 1-2, 1–8) ★"}, {"cat": "Sequencer", "combo": "[SHIFT] + [B (MENU)] → INSR", "action": "Insert empty step at selected position"}, {"cat": "Sequencer", "combo": "[SHIFT] + [B (MENU)] → DUPL", "action": "Double pattern (copies all steps, doubles length)"}, {"cat": "Sequencer", "combo": "[SHIFT] + [B (MENU)] → COPY / PSTE", "action": "Copy and paste a step"}, {"cat": "Sequencer", "combo": "[SHIFT] + [B (MENU)] → A.vLo", "action": "Set accent velocity for phrases"}, {"cat": "Sequencer", "combo": "[SHIFT] + [B (MENU)] → P.chg", "action": "Set pattern change timing (at next step, or after N beats)"}, {"cat": "Transpose", "combo": "[SHIFT] + [A (KEY)]", "action": "Transpose keyboard — set value with [TEMPO/VALUE] ★"}, {"cat": "Edit / Nav", "combo": "[SHIFT] + [D (ENTER)]", "action": "Confirm value or selection"}, {"cat": "Edit / Nav", "combo": "[SHIFT] + [C (EXIT)]", "action": "Exit current menu"}, {"cat": "Edit / Nav", "combo": "[SHIFT] + [B (MENU)]", "action": "Open settings menu"}, {"cat": "Save", "combo": "[SHIFT] + [C (WRITE)] → [D (ENTER)]", "action": "Save pattern ★"}], "tips": ["Per-step STYLE: when a step has STYLE:ON it stores its own phrase — style keeps playing even if following steps are STYLE:OFF", "When all steps are STYLE:OFF, the pattern-level style applies uniformly to all steps", "VARIATION knob: subtle changes within a style — different rhythmic emphasis, not a full new pattern", "Use DUPL to double a 4-bar pattern to 8 bars, then edit the second half for a B section"], "scaleRef": [{"scale": "C major", "sets": "7", "keys": ["C", "D", "E", "F", "G", "A", "B"], "tip": "White keys only. Black keys = dim p {"id": "p6", "name": "Roland P-6", "cat": "Sampler", "color": "#27ae60", "use": "Sample pad performance, loop/granular/looper, dual FX bus routing, pattern sequencing, motion recording, sampling", "overview": "6-pad looper/sampler with built-in mic, GRANULAR pad, 6-slot effect chain, and two independent FX buses (BUS A, BUS B, BUS EFFECT). Pads routed independently per bus. Pattern sequencer supports real-time and step input with motion recording (knob automation per step). 20 MFX types including DJFX Looper, Scatter, Isolator, Resonator, Vinyl Sim, Cassette Sim, Lo-Fi, Crusher, Compressor, and more. 4 banks × 16 patterns × 16 steps. 48 sample slots (8 banks × 6 pads).", "workflow": ["<b>Play a pattern:</b> Press <kbd>[COPY ►]</kbd> to start/stop. Set tempo: turn <kbd>[TEMPO/VALUE]</kbd> (fine adjust: <kbd>[SHIFT]</kbd> + <kbd>[TEMPO/VALUE]</kbd> in 0.1 BPM steps, range 40.0–300.0)", "<b>Select pattern:</b> Press <kbd>[PATTERN]</kbd> → hold <kbd>[PATTERN]</kbd> + top-4 step buttons to pick bank (1–4) → release <kbd>[PATTERN]</kbd> → press step button 1–16 for pattern number. To queue next pattern while playing: hold <kbd>[PATTERN]</kbd> + press step (switches at end of current pattern)", "<b>Mute a pad:</b> <kbd>[SHIFT]</kbd> + sample pad [1–6] or <kbd>[GRANULAR]</kbd> while pattern is playing. Repeat to unmute. <kbd>[SHIFT]</kbd> + BANK button mutes entire bank", "<b>Bus routing:</b> Dim glow = BUS A (dry) | Blinking dim = BUS B (dry) | Bright = BUS EFFECT (through MFX chain). Toggle: <kbd>[MFX]</kbd> + pad (A↔EFFECT) | <kbd>[DELAY]</kbd> + <kbd>[MFX]</kbd> + pad (B↔EFFECT)", "<b>Step input:</b> Press pad to select it, then press step buttons to toggle steps on/off. Lit step = active. Press lit step again to remove it", "<b>Step edit (note/vel/prob/gate/substep):</b> Long-press step button until it blinks → while holding, press <kbd>[GRANULAR]</kbd> to cycle through: note / velocity / probability / gate time / sub step → turn <kbd>[TEMPO/VALUE]</kbd> to change", "<b>Copy step / Paste step:</b> Press <kbd>[QUANTIZE]</kbd> → VALUE to select source step → <kbd>[KYBD]</kbd> + <kbd>[OCT+]</kbd> → VALUE → 'COPY' → <kbd>[ENTER]</kbd>. Then VALUE to select dest → <kbd>[KYBD]</kbd> + <kbd>[OCT+]</kbd> → 'PStE' → <kbd>[ENTER]</kbd>", "<b>Duplicate all steps (double length):</b> Press <kbd>[QUANTIZE]</kbd> → <kbd>[KYBD]</kbd> + <kbd>[OCT+]</kbd> → VALUE → 'DUPL' → <kbd>[ENTER]</kbd>. All steps are copied after last step", "<b>Copy/paste pattern:</b> <kbd>[SHIFT]</kbd> + <kbd>[COPY]</kbd> → VALUE → 'Ptn' → <kbd>[ENTER]</kbd> → VALUE to select dest → <kbd>[ENTER]</kbd>. Copy a pad's sequence: VALUE → 'PArt' → <kbd>[ENTER]</kbd> → select dest pattern → <kbd>[SHIFT]</kbd> + <kbd>[COPY]</kbd> → select dest pad → <kbd>[ENTER]</kbd>", "<b>Pattern length:</b> <kbd>[SHIFT]</kbd> + <kbd>[D' LAST]</kbd> → turn <kbd>[TEMPO/VALUE]</kbd> → <kbd>[EXIT]</kbd>. <b>Shuffle:</b> <kbd>[SHIFT]</kbd> + <kbd>[D SHUFFLE]</kbd> → VALUE (-90–90; 10–16 = pleasant groove) → <kbd>[EXIT]</kbd>", "<b>Real-time record:</b> <kbd>[QUANTIZE]</kbd> → <kbd>[COPY ►]</kbd>; turn PITCH/START/END/LEVEL knobs to record motion automation. <b>Delete step motion:</b> Press <kbd>[QUANTIZE]</kbd> → VALUE to select step → <kbd>[SHIFT]</kbd> + <kbd>[OCT- MOTION]</kbd> → <kbd>[ENTER]</kbd>", "<b>Route pad to bus: </b><kbd>[MFX]</kbd> + pad (A↔EFFECT) | <kbd>[DELAY]</kbd>+<kbd>[MFX]</kbd>+pad (B↔EFFECT). MFX effect select: hold <kbd>[MFX]</kbd> + step buttons. Use CTRL1/2/3 to tweak parameters", "<b>Sampling:</b> Press <kbd>[SAMPLING]</kbd> → press blinking pad → press <kbd>[SAMPLING]</kbd> to start → press <kbd>[SAMPLING]</kbd> to stop &amp; save. Level: watch step-button VU meter, aim for C–TIE buttons (-3 to 0 dB) occasionally lighting. Rate: <kbd>[LO-Fi]</kbd> cycles 44.1k→22.0k→14.7k→11.0k", "<b>Step sampling (equal slices):</b> In sampling mode: <kbd>[SHIFT]</kbd> + <kbd>[PITCH]</kbd> → S.2–S.64 slices. Then sample repeatedly — unit auto-assigns note numbers starting at C4 per sli osition"}, {"source": "END", "code": "G.Si2", "range": "", "desc": "Grain size"}, {"source": "VALUE", "code": "SNPL", "range": "A-1, A-2...", "desc": "Grain source: bank-pad"}, {"source": "VALUE", "code": "G.ruS", "range": "0–100", "desc": "Grain reverse probability"}, {"source": "VALUE", "code": "G.tN.J", "range": "0–100", "desc": "Grain jitter"}, {"source": "VALUE", "code": "G.ky.F", "range": "0–255", "desc": "Grain key follow"}, {"source": "VALUE", "code": "St.Nd", "range": "CoLd / hot", "desc": "Gradual playback (cold=gradual, hot=instant)"}, {"source": "VALUE", "code": "h.SPd", "range": "-4.00–4.00", "desc": "Grain playback speed"}]}, {"name": "FILTER", "access": "SHIFT + G'", "rows": [{"source": "TYPE", "code": "LPF/bPF/hPF/PKG", "range": "", "desc": "Filter type (Low/Band/High/Peaking)"}, {"source": "CTRL1", "code": "Cut.F", "range": "", "desc": "Cutoff frequency"}, {"source": "CTRL2", "code": "rESO", "range": "", "desc": "Resonance"}, {"source": "CTRL3", "code": "Eu.dP", "range": "", "desc": "Filter envelope depth"}, {"source": "CTRL1", "code": "C.ky.F", "range": "", "desc": "Cutoff key follow"}, {"source": "CTRL2", "code": "uEL.S", "range": "", "desc": "Velocity → cutoff"}, {"source": "PITCH", "code": "tyPE (auto chop)", "range": "S.1–S.64", "desc": "Sample auto-chop via SHIFT+PITCH"}]}, {"name": "MIXER", "access": "SHIFT + A", "rows": [{"source": "PITCH", "code": "PAn", "range": "", "desc": "Pan position"}, {"source": "START", "code": "Snd.d", "range": "", "desc": "Delay send level"}, {"source": "END", "code": "Snd.r", "range": "", "desc": "Reverb send level"}, {"source": "LEVEL", "code": "LEuL", "range": "", "desc": "Volume level"}, {"source": "VALUE", "code": "Leu.J", "range": "0–100", "desc": "Grain random volume"}, {"source": "VALUE", "code": "OUt.b", "range": "bUS.A/bUS.b/EFCt", "desc": "Select output bus"}, {"source": "VALUE", "code": "A.PAn", "range": "OFF/Alt/SUn9/rnd", "desc": "Auto pan mode"}]}, {"name": "DELAY", "access": "SHIFT + A' — Delay side", "rows": [{"source": "PITCH", "code": "d.tiN", "range": "1–740 / 1_4…", "desc": "Delay time (ms or synced note value)"}, {"source": "START", "code": "d.LEu", "range": "0–255", "desc": "Delay level"}, {"source": "VALUE", "code": "d.Syn", "range": "OFF / On", "desc": "Delay sync with tempo"}, {"source": "VALUE", "code": "d.FbK", "range": "0–255", "desc": "Feedback"}, {"source": "VALUE", "code": "d.F.Nd", "range": "norN/Cr.Lr/Cr.rL", "desc": "Feedback mode (normal or panning L→R / R→L)"}, {"source": "VALUE", "code": "d.L.Ct", "range": "FLAt–800 Hz", "desc": "Low cut"}, {"source": "VALUE", "code": "d.H.Ct", "range": "630–FLAt Hz", "desc": "High cut"}, {"source": "VALUE", "code": "d.L.Nd", "range": "PrE / PoSt", "desc": "Level change: smooth vs hard stop"}, {"source": "VALUE", "code": "d.to.r", "range": "0–255", "desc": "Delay to reverb send"}]}, {"name": "REVERB", "access": "SHIFT + A' — Reverb side", "rows": [{"source": "PITCH", "code": "r.tyP", "range": "ANb/rooN/hALl/hAlL2/PLAt/Nod", "desc": "Reverb type"}, {"source": "END", "code": "r.tiN", "range": "0–255", "desc": "Reverb length"}, {"source": "LEVEL", "code": "r.Leu", "range": "0–255", "desc": "Reverb level"}, {"source": "VALUE", "code": "r.Pdl", "range": "0–100", "desc": "Pre-delay"}, {"source": "VALUE", "code": "r.L.Ct", "range": "FLAt–800 Hz", "desc": "Low cut"}, {"source": "VALUE", "code": "r.H.Ct", "range": "630–FLAt Hz", "desc": "High cut"}, {"source": "VALUE", "code": "r.dnS", "range": "0–10", "desc": "Reverb density"}, {"source": "VALUE", "code": "GL.dr", "range": "OFF / On", "desc": "Use pattern or global settings"}]}]},
{"id": "sp404", "name": "SP-404 MK2", "cat": "Groovebox / Sampler", "color": "#e67e22", "use": "Sampling, beat making, live pad performance, TR-REC patterns, EFX motion rec, DJ mode, skip-back sampling", "overview": "Performance sampler: 16 pads × 10 banks (A–J), TR-REC pattern sequencer, dual FX buses (BUS 1/2/3/4), DJ mixer mode, EFX motion recording, skip-back sampling (SBS), CHROMATIC mode, BOUNCE, and a full shortcut system. Version 5.50.", "workflow": ["<b>Play samples:</b> Bank <kbd>[A/F]</kbd>–<kbd>[E/J]</kbd> to select bank → press pads <kbd>[1–16]</kbd> to play samples. <kbd>[SHIFT]</kbd> + <kbd>[REVERSE]</kbd> + pad = toggle mute on/off", "<b>Sampling:</b> <kbd>[EXT SOURCE]</kbd> → set input level (watch VU meter, aim for 0 dB peak) → <kbd>[REC]</kbd> → press a pad → play/sing into mic/line in → <kbd>[REC]</kbd> to save. <kbd>[SHIFT]</kbd> + <kbd>[RECORD SETTING]</kbd> for auto-gain, count-in, END SNAP", "<b>Set tempo:</b> <kbd>[SHIFT]</kbd> + <kbd>Pad[11]</kbd> = TAP TEMPO (tap <kbd>[SUB PAD]</kbd> button repeatedly to lock BPM to your taps). Or during recording: <kbd>[SHIFT]</kbd> + <kbd>[CTRL1]</kbd> knob = BPM", "<b>TR-REC (step recording):</b> <kbd>[PATTERN SELECT]</kbd> → press empty red pad to start → <kbd>[REMAIN]</kbd> = switch to TR-REC mode → <kbd>[REC]</kbd> → <kbd>[SUB PAD]</kbd> + pads to silently select samples → <kbd>[CTRL2]</kbd> = pitch / <kbd>[CTRL3]</kbd> = velocity → press step buttons 1–16 to place on steps. <kbd>[DEL]</kbd> = erase mode (hold pad to erase). Press <kbd>[EXIT]</kbd> 2× to finish", "<b>Step edit (TR-REC):</b> Knobs during TR-REC: <kbd>[CTRL1]</kbd> = SUBSTEP (divide steps) or HOLD STEP (length), <kbd>[CTRL2]</kbd> = PITCH (-12–+12), <kbd>[CTRL3]</kbd> = VELOCITY (0–127). <kbd>[PITCH/SPEED]</kbd> = chromatic pitch mode per step. <kbd>[SHIFT]</kbd> + <kbd>[CTRL1]</kbd> = BPM, <kbd>[SHIFT]</kbd> + <kbd>[CTRL2]</kbd> = SHUFFLE (-50–+50), <kbd>[SHIFT]</kbd> + <kbd>[CTRL3]</kbd> = START offset (-50–99%)", "<b>Pattern bank selection:</b> Press bank <kbd>[A/F]</kbd>–<kbd>[E/J]</kbd> buttons to switch. Banks A–E lit solid / F–J blinking. Each bank holds 16 patterns independently. <kbd>[SHIFT]</kbd> + bank = set all pads in that bank to same bus", "<b>Bus routing (REMAIN + pad):</b> Hold <kbd>[REMAIN]</kbd> long → pads show color (orange=BUS1, green=BUS2, white=DRY). Press pad to toggle: BUS 1/2 ↔ DRY. Hold bank button = set all pads in bank to same bus. <kbd>[BUS FX]</kbd> toggles which bus to edit (lit=BUS1, blinking=BUS2)", "<b>Effect configs:</b> Press effect buttons: <kbd>[FILTER+DRIVE]</kbd>, <kbd>[RESONATOR]</kbd>, <kbd>[DELAY]</kbd>, <kbd>[ISOLATOR]</kbd>, <kbd>[DJFX LOOPER]</kbd>, <kbd>[MFX]</kbd> → turns effect on. <kbd>[CTRL1]</kbd>–<kbd>[CTRL3]</kbd> = main params. While holding <kbd>[VALUE]</kbd> + <kbd>[CTRL1]</kbd>–<kbd>[CTRL3]</kbd> = sub-params. <kbd>[SHIFT]</kbd> + <kbd>[MARK]</kbd> 3 sec = save BUS 1/2 effect params", "<b>Envelope (volume shape):</b> <kbd>[SHIFT]</kbd> + <kbd>[PITCH/SPEED]</kbd> → select pad → <kbd>[CTRL1]</kbd> = ATTACK (0–127, 0–3 sec fade-in) / <kbd>[CTRL2]</kbd> = HOLD (1–100% playback range) / <kbd>[CTRL3]</kbd> = RELEASE (0–127, 0–3 sec fade-out)", "<b>Chopping (CHOP):</b> Set markers first: during sample playback press <kbd>[MARK]</kbd> to place splits. Then <kbd>[SHIFT]</kbd> + <kbd>[START/END]</kbd> → <kbd>[VALUE]</kbd> = ASSIGN TO PAD → select empty pads to assign chunks → <kbd>[CTRL2]</kbd> = select marker → turn <kbd>[VALUE]</kbd> to arrange → <kbd>[MARK]</kbd> to confirm", "<b>Bouncing (BOUNCE):</b> <kbd>[PATTERN SELECT]</kbd> → select pattern to convert → <kbd>[COPY]</kbd> → hold <kbd>[HOLD]</kbd> + pads = select pattern chain → <kbd>[COPY]</kbd> → press empty blue pad to save as new sample. Auto-bypasses all BUS 1–4 effects. Can use bank buttons + <kbd>[CTRL3]</kbd> to assign to different project", "<b>Muting:</b> Press <kbd>[REVERSE]</kbd> + pad = toggle mute on/off (muted = red, unmuted = white). <kbd>[REVERSE]</kbd> + <kbd>[REMAIN]</kbd> = PAD MUTE MODE (latches mute state). <kbd>[SHIFT]</kbd> + <kbd>[BUS FX]</kbd> = MUTE BUS (mutes BUS 1/2 input, leaves reverb/delay tails)", "<b>Mute events (PAD MUTE MOTION):</b> Record: <kbd>[PATTERN SELECT]</kbd> → select pattern → <kbd>[REC]</kbd> → <kbd>[SHIFT]</kbd> + <kbd>[REVERSE]</kbd> + <kbd>[REMAIN]</kbd> = PAD MUTE MODE (MOTION REC) → press pads to mute/unmute while pattern plays → <kbd>[EXIT]</kbd> to finish. Delete all: <kbd>[PATTERN EDIT]</kbd> → select pattern → <kbd>[DEL]</kbd> + <kbd>[REVERSE]</kbd>. Delete specific: same PAD MUTE MODE → press <kbd>[DEL]</kbd> → press pads you want to erase from while listening", "Real-time recording: <kbd>[PATTERN SELECT]</kbd> → select empty red pad → <kbd>[REMAIN]</kbd> lit (not blinking) = Real-Time mode → <kbd>[REC]</kbd> → press pads freely to record notes in real time. Press <kbd>[HOLD]</kbd> + pad = latch trigger. <kbd>[ROLL]</kbd> + pad = rapid repeated hits", "EFX Motion Rec: <kbd>[PATTERN SELECT]</kbd> → select pattern → <kbd>[PLAY]</kbd> to play → <kbd>[REC]</kbd> → <kbd>[MARK]</kbd> → operate effect buttons / CTRL knobs to automate → <kbd>[EXIT]</kbd>. Deletes with <kbd>[DEL]</kbd> + <kbd>[MARK]</kbd> during pattern edit", "DJ mode: <kbd>[D/I]</kbd> + <kbd>[E/J]</kbd> simultaneously → assigns CH1 (left channel) and CH2 (right channel) → <kbd>[CTRL1]</kbd> = CH1 level, <kbd>[CTRL2]</kbd> = CH2 level, <kbd>[CTRL3]</kbd> = crossfade. <kbd>[ROLL]</kbd> + pad[13/15] = loop/roll CH1/CH2. <kbd>[SHIFT]</kbd> + pad = play from marker position", "Live FX swap: <kbd>[REMAIN]</kbd> + <kbd>[BUS FX]</kbd> = swaps BUS 1 ↔ BUS 2 effects in real time (parameter values preserved). Hold <kbd>[REMAIN]</kbd> 3 sec → LIVE MODE (disables all edit buttons for stage safety)"], "shortcuts": [{"cat": "[SHIFT] + Pad — Sample modes", "combo": "[SHIFT] + Pad[1]", "action": "FIXED VELOCITY — always plays at max (127)"}, {"cat": "[SHIFT] + Pad — Sample modes", "combo": "[SHIFT] + Pad[2]", "action": "16 VELOCITY — velocity changes in steps on each hit"}, {"cat": "[SHIFT] + Pad — Sample modes", "combo": "[SHIFT] + Pad[3]", "action": "CUE — adjust headphone cue monitor balance"}, {"cat": "[SHIFT] + Pad — Sample modes", "combo": "[SHIFT] + Pad[4]", "action": "CHROMATIC — 16 pads = same sample at chromatic pitches ★"}, {"cat": "[SHIFT] + Pad — Sample modes", "combo": "[SHIFT] + Pad[5]", "action": "EXCHANGE — swap sample/pattern data between two pads"}, {"cat": "[SHIFT] + Pad — Sample modes", "combo": "[SHIFT] + Pad[6]", "action": "INIT PARAM — reset selected pad's sample parameters"}, {"cat": "[SHIFT] + Pad — Groups", "combo": "[SHIFT] + Pad[7]", "action": "PAD LINK — one pad triggers all pads in same group"}, {"cat": "[SHIFT] + Pad — Groups", "combo": "[SHIFT] + Pad[8]", "action": "MUTE GROUP — group pads that must not play simultaneously"}, {"cat": "[SHIFT] + Pad — Timing/Utility", "combo": "[SHIFT] + Pad[9]", "action": "METRONOME on/off"}, {"cat": "[SHIFT] + Pad — Timing/Utility", "combo": "[SHIFT] + Pad[10]", "action": "COUNT-IN before sampling/pattern record starts"}, {"cat": "[SHIFT] + Pad — Timing/Utility", "combo": "[SHIFT] + Pad[11]", "action": "TAP TEMPO ★"}, {"cat": "[SHIFT] + Pad — Timing/Utility", "combo": "[SHIFT] + Pad[12]", "action": "Open GAIN settings (UTILITY > SYSTEM > GAIN)"}, {"cat": "[SHIFT] + Pad — Timing/Utility", "combo": "[SHIFT] + Pad[13]", "action": "Open UTILITY MENU ★"}, {"cat": "[SHIFT] + Pad — Timing/Utility", "combo": "[SHIFT] + Pad[14]", "action": "Open IMPORT / EXPORT menu ★"}, {"cat": "[SHIFT] + Pad — Timing/Utility", "combo": "[SHIFT] + Pad[15]", "action": "Open PAD SETTING"}, {"cat": "[SHIFT] + Pad — Timing/Utility", "combo": "[SHIFT] + Pad[16]", "action": "Open EFX SETTING"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [BUS FX]", "action": "MUTE BUS — output dry only (bypass bus FX) ★"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [HOLD]", "action": "PAUSE current sample playback"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [EXT SOURCE]", "action": "Open INPUT SETTING screen"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [SUB PAD]", "action": "SELECT PROJECT screen"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [PITCH/SPEED]", "action": "ENVELOPE editor — set volume shape over playback"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [START/END]", "action": "CHOP — split sample at markers → assign to individual pads ★"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [PATTERN SELECT]", "action": "UNDO last pattern input (while recording only)"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [ROLL]", "action": "ROLL SET — set roll interval (1/4, 1/2, 1, 2 bars) ★"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [LOOP]", "action": "PING-PONG LOOP — forward then backward loop ★"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [GATE]", "action": "GATE ALL ON/OFF for selected bank"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [BPM SYNC]", "action": "SYNC ALL ON/OFF for selected bank"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [REC] (during playback)", "action": "TR-REC — step-record on playing pattern ★"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [COPY]", "action": "BANK PROTECT — lock pads from copy/overwrite/delete ★"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [VALUE] (press knob)", "action": "MARK mode toggle: SBS skip-back sampling ↔ Looper"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [RESAMPLE]", "action": "SAMPLE MERGE MODE"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [RECORD SETTING]", "action": "SOUND GENERATOR MODE"}, {"cat": "[SHIFT] + Button", "combo": "[SHIFT] + [EXIT]", "action": "STOP — stop all sample playback ★"}, {"cat": "[SHIFT] + Button", "combo": "Bank [A/F]–[E/J] + [SHIFT]", "action": "BANK VOLUME — adjust entire bank output level"}, {"cat": "[SHIFT] + Button", "combo": "Hold [MARK] 3 seconds", "action": "Save BUS 1 & BUS 2 effect parameters"}, {"cat": "[SHIFT] + Button", "combo": "Hold [REMAIN] 3 seconds", "action": "LIVE MODE — disab {"id": "smpltrek", "name": "SmplTrek", "cat": "Sampler / Groovebox", "color": "#8e44ad", "use": "Multi-track sampling, scene-based arrangement, drum kits, looper recording", "overview": "Project-based 15-pad sampler/groovebox. A project = multiple scenes; each scene = 10 sequencer tracks + 3 audio tracks. Play full project (scenes advance) or launch individual scenes as loops for live improv. 5 control knobs + directional pad.", "workflow": ["Power on → Home Screen auto-opens; press project button to load/browse projects", "Press <kbd>STEP</kbd> buttons to launch and loop individual scenes (each loops until you pick another)", "Press <kbd>PLAY</kbd> to run the full project — scenes advance automatically in order", "Hold a track pad → select REC SRC → confirm → begins quick sampling directly to that track", "Resample: <kbd>Func</kbd> + <kbd>Rec</kbd> → select source track → <kbd>Rec</kbd> to capture", "Loop track record: press <kbd>Rec</kbd> on the Edit screen of a LOOP track → plays back and re-records simultaneously", "Drum kit: press <kbd>DRUM</kbd> track button → select kit in pool → 15 pads = individual drum sounds", "Edit sample: press <kbd>Edit</kbd> → use direction buttons + VALUE knob to set chop points, trim, pitch, stretch", "Press <kbd>Mixer</kbd> button → use knobs A–D to set levels, pan, and send FX per track", "Export: <kbd>Mixer</kbd> → scroll to Mixdown or Stem → <kbd>OK</kbd> to bounce to file"], "shortcuts": [{"cat": "Home / Navigation", "combo": "[Home] button", "action": "Return to Home Screen (project overview) ★"}, {"cat": "Home / Navigation", "combo": "[Project] button", "action": "Open Project screen"}, {"cat": "Home / Navigation", "combo": "[Direction pad] ↑↓←→", "action": "Navigate menus, select items"}, {"cat": "Home / Navigation", "combo": "[OK] button", "action": "Confirm selection / open item"}, {"cat": "Home / Navigation", "combo": "[CLR] button", "action": "Clear / cancel / go back"}, {"cat": "Home / Navigation", "combo": "[Func] + ot  → [B] knob", "action": "LFO pitch/shape depth: P0.0–P00L / S0.00–S100"}, {"cat": "OSC — MODE+knobs", "combo": "Hold [OSC] + [MODE] → [TYPE] knob", "action": "Audio input mode: In Mode / In Level"}, {"cat": "FILTER — TYPE values", "combo": "LP2 / LP4 / BP2 / BP4 / HP2 / HP4 / OFF", "action": "Select filter type ★"}, {"cat": "FILTER — knobs", "combo": "[A] knob", "action": "Cutoff (CutF) — filter brightness"}, {"cat": "FILTER — knobs", "combo": "[B] knob", "action": "Resonance (rESo) — overtone peak at cutoff"}, {"cat": "FILTER — MODE+knobs", "combo": "Hold [FILTER] + [MODE] → [A] knob", "action": "Cutoff sweep rate: F0.0–F30.0 ★"}, {"cat": "FILTER — MODE+knobs", "combo": "Hold [FILTER] + [MODE] → [B] knob", "action": "Sweep depth + direction: U0.00–U00L (up) / D0.00–D100 (down)"}, {"cat": "EG — TYPE values", "combo": "ADSR / AHR / AR / AR-Loop / Open", "action": "Select envelope type ★"}, {"cat": "EG — knobs", "combo": "[A] knob", "action": "Attack — time to reach peak"}, {"cat": "EG — knobs", "combo": "[B] knob", "action": "Release — time to reach zero after note end"}, {"cat": "EG — MODE+knobs", "combo": "Hold EG + [MODE] → [A] knob", "action": "Tremolo rate: F0.0–F60.0"}, {"cat": "EG — MODE+knobs", "combo": "Hold EG + [MODE] → [B] knob", "action": "Tremolo depth: D0.0–D00L"}, {"cat": "MOD FX — TYPE values", "combo": "OFF / Chorus / Ensemble / Phaser / Flanger", "action": "Select mod FX ★"}, {"cat": "MOD FX — knobs", "combo": "[A] knob", "action": "Modulation speed (Time)"}, {"cat": "MOD FX — knobs", "combo": "[B] knob", "action": "Modulation depth"}, {"cat": "DELAY — TYPE values", "combo": "OFF / Stereo / Mono / Ping-Pong / High-Pass / Tape", "action": "Select delay type ★"}, {"cat": "DELAY — knobs", "combo": "[A] knob", "action": "Delay time"}, {"cat": "DELAY — knobs", "combo": "[B] knob", "action": "Delay depth / dry-wet mix (D0.00–D00L / W0.00–W100)"}, {"cat": "REVERB — TYPE values", "combo": "OFF / Hall / Plate / Space / Riser / Submarine", "action": "Select reverb type ★"}, {"cat": "REVERB — knobs", "combo": "[A] knob", "action": "Reverb time"}, {"cat": "REVERB — knobs", "combo": "[B] knob", "action": "Reverb depth / wet mix"}, {"cat": "Arpeggiator", "combo": "[ARP] (single press)", "action": "Toggle arp — runs while ribbon key is held ★"}, {"cat": "Arpeggiator", "combo": "[ARP] (long press)", "action": "Latch arp — keeps running without holding key ★"}, {"cat": "Arpeggiator", "combo": "Hold [ARP] → [OSC] button", "action": "Chord: Octave"}, {"cat": "Arpeggiator", "combo": "Hold [ARP] → [FILTER] button", "action": "Chord: Major Suspended"}, {"cat": "Arpeggiator", "combo": "Hold [ARP] → [MOD] button", "action": "Chord: Major Augmented"}, {"cat": "Arpeggiator", "combo": "Hold [ARP] → [DELAY] button", "action": "Chord: Minor Triad"}, {"cat": "Arpeggiator", "combo": "Hold [ARP] → [REVERB] button", "action": "Chord: Minor Diminished"}, {"cat": "Arpeggiator", "combo": "Hold [ARP] → [TYPE] knob", "action": "Pattern: Up/Down/Up-Down/Down-Up/Converge/Diverge/Conv-Div/Div-Conv/Random/Stochastic ★"}, {"cat": "Arpeggiator", "combo": "Hold [ARP] → [A] knob", "action": "Pattern length: 1–24 steps"}, {"cat": "Arpeggiator", "combo": "Hold [ARP] → [B] knob", "action": "Tempo: 56–240 BPM (or step duration 16th–64th if synced) ★"}, {"cat": "Global (hold REVERB on power-on)", "combo": "[TYPE] knob → select param, [B] knob → set value", "action": "Edit global parameter ★"}, {"cat": "Global (hold REVERB on power-on)", "combo": "Input route (InrOut)", "action": "0=before MOD, 1=before DELAY, 2=before REVERB, 3=before master, 4=after master"}, {"cat": "Global (hold REVERB on power-on)", "combo": "MIDI clock source (CLk)", "action": "0=internal, 1=auto (follows external)"}, {"cat": "Global (hold REVERB on power-on)", "combo": "MIDI route (rout)", "action": "0=USB+MIDI, 1=USB only"}, {"cat": "Global (hold REVERB on power-on)", "combo": "EG Legato (LGT)", "action": "0=off, 1=on (default)"}, {"cat": "Global (hold REVERB on power-on)", "combo": "[ARP] button (in global mode)", "action": "Save settings and restart ★"}], "tips": ["VPM engine: A = mod index (brightness/clang), B = ratio (harmonics) — quick FM-like timbres; start with B=1 then raise A", "AR-Loop EG type: envelope retriggers itself continuously — functions as a low-rate tremolo/gate without using the LFO", "Filter sweep direction: positive B values sweep up, negative sweep down — great for auto-filter risers and drops", "Arpeggiator chord types (OSC/FILTER/MOD/DELAY/REVERB buttons while holding ARP) apply to every arp step — octave, sus4, aug, min, dim", "Stochastic arp pattern: probabilistic step order — not fully random, weighted toward the original — great for generative feels", "User OSC: load any logue SDK oscillator (community library at nutekt.org); it fully replaces the built-in engine slot", "SYNC OUT jack sends a 5ms pulse at each step — chain to volca, NTS-3, or other SYNC gear for locked tempo"]},
{"id": "seqtrak", "name": "Yamaha SeqTrack", "cat": "Groovebox", "color": "#1f618d", "use": "Beat production, melodic step sequencing, DX FM synthesis, sampling, on-the-go sketching", "overview": "Compact battery-powered groovebox with 5 track types (Drums, Synth 1/2, DX Synth, Sampler), step sequencer per track, built-in AWM2+FM voices, scale/key lock, parameter locking, motion recording, and per-step probability. USB audio/MIDI, built-in speaker.", "workflow": ["Select track (Drums / Synth 1 / Synth 2 / DX Synth / Sampler) → turn <kbd>SOUND</kbd> knob to pick preset", "Set scale: press <kbd>SCALE</kbd> → choose Major/Minor/Pentatonic/Lydian/Dorian/Mixolydian/Phrygian", "Set key: press <kbd>KEY</kbd> → choose root note C–B (including sharps)", "Record drums: <kbd>HOLD</kbd> + <kbd>ALL</kbd> + KICK/SNARE/etc → realtime input mode → tap pads", "Record synth steps: <kbd>HOLD</kbd> + <kbd>PAGE</kbd> + ↓ → step input mode → press step buttons to enter notes", "Set pattern length (drums): <kbd>HOLD</kbd> + <kbd>PAGE</kbd> + turn encoder (press+turn for full bars)", "Set pattern length (synth): <kbd>HOLD</kbd> + turn encoder; use PAGE to navigate bars", "Parameter lock: hold a step button + turn <kbd>SOUND</kbd> knob → param locked for that step only ★", "Motion recording: <kbd>HOLD</kbd> + REC button + turn any knob → automation recorded per step ★", "Enter Song mode: <kbd>HOLD</kbd> + <kbd>ALL</kbd> + <kbd>PROJECT</kbd> button; Mixer: <kbd>HOLD</kbd> + <kbd>ALL</kbd> + <kbd>VOL+</kbd>"], "shortcuts": [{"cat": "Project", "combo": "[PROJECT] + [ALL] + step buttons", "action": "Switch project ★"}, {"cat": "Project", "combo": "[PROJECT] + [ALL] + hold step (LED flashes red)", "action": "Delete project"}, {"cat": "Project", "combo": "[ALL] + [encoder] (or [ALL] + [encoder] from 5–300)", "action": "Set project tempo ★"}, {"cat": "Project", "combo": "[ALL] + [encoder] (hold [DELETE] + press [SWING] to reset)", "action": "Apply swing ★"}, {"cat": "Project", "combo": "[ALL] + [BPM+] → step buttons ON/OFF", "action": "Enable / disable metronome ★"}, {"cat": "Project", "combo": "[PROJECT] + [ALL] + step buttons (LED yellow)", "action": "Temp Save ★"}, {"cat": "Project", "combo": "[PROJECT] + [ALL] + step buttons (LED cyan)", "action": "Temp Restore ★"}, {"cat": "Scale / Key", "combo": "[SCALE] button → step buttons", "action": "Set scale: Minor, Major, Minor Pent, Major Pent, Lydian, Dorian, Mixolydian, Phrygian ★"}, {"cat": "Scale / Key", "combo": "[KEY] button → step buttons", "action": "Set root key: C C# D D# E F F# G G# A A# B ★"}, {"cat": "Tracks & Patterns", "combo": "[Track] button or [SNARE] + step buttons", "action": "Pattern switch (quantized) ★"}, {"cat": "Tracks & Patterns", "combo": "[PROJECT] + [ALL] + [encoder]", "action": "Pattern change quantization (each unit = 1 measure; applies to Scene changes too)"}, {"cat": "Tracks & Patterns", "combo": "[ALL] + hold step (LED flashes red)", "action": "Delete pattern ★"}, {"cat": "Tracks & Patterns", "combo": "[ALL] + hold + step buttons", "action": "Delete all current patterns"}, {"cat": "Tracks & Patterns", "combo": "[Track] [ALL]/[TRACK] + step buttons", "action": "Copy pattern ★"}, {"cat": "Copy / Paste", "combo": "[HOLD] 2s on source step", "action": "Step copy ★"}, {"cat": "Copy / Paste", "combo": "[HOLD] + step + step", "action": "Step paste"}, {"cat": "Copy / Paste", "combo": "[Track] + step buttons", "action": "Pattern copy ★"}, {"cat": "Copy / Paste", "combo": "[Track] + [HOLD] + [PAGE] + step buttons", "action": "Pattern paste"}, {"cat": "Drum Track", "combo": "[HOLD] + [SNARE] + [encoder]", "action": "Drum pattern length (press+turn = full bars / 4-step increments) ★"}, {"cat": "Drum Track", "combo": "[HOLD] + step + [encoder]", "action": "Set step probability: 10 / 23 / 36 / 49 / 61 / 74 / 87 / 100% ★"}, {"cat": "Drum Track", "combo": "[HOLD] + [encoder] + [KICK]", "action": "Micro timing per step (−60 to +58 ticks) ★"}, {"cat": "Drum Track", "combo": "[HOLD] + step buttons", "action": "Substep (divide step into finer subdivisions) ★"}, {"cat": "Drum Track", "combo": "[HOLD] + [ALL] + [KICK] / [SNARE] / [CLAP] / [HAT1] / [HAT2] / [PERC1] / [PERC2]", "action": "Enable realtime input mode for drum part ★"}, {"cat": "Synth / DX Track", "combo": "[HOLD] + [BAR LENGTH] + [encoder] ([SYNTH])", "action": "Synth pattern length (16-step / bar increments) ★"}, {"cat": "Synth / DX Track", "combo": "[ALL] + [encoder] (synth)", "action": "Toggle input quantize ★"}, {"cat": "Synth / DX Track", "combo": "[ALL] + [encoder] + [KEY]", "action": "Keyboard input mode ★"}, {"cat": "Synth / DX Track", "combo": "[ALL] + step + [SYNTH 1]", "action": "Step sequencer mode"}, {"cat": "Synth / DX Track", "combo": "[HOLD] + step buttons → select notes with drum keys", "action": "Edit chord notes on a synth step ★"}, {"cat": "Synth / DX Track", "combo": "[HOLD] + [ALL] + [encoder]", "action": "Change note length for all steps"}, {"cat": "Sampler Track", "combo": "[REC SAMPLE] + pad 1–3", "action": "Change recording source: MIC/IN / USB / Resample ★"}, {"cat": "Sampler Track", "combo": "[REC SAMPLE] + [encoder]", "action": "Monitoring mode — adjust incoming audio level"}, {"cat": "Sampler Track", "combo": "[REC SAMPLE] + step buttons", "action": "Count-in setting (lit = ON, dark = OFF)"}, {"cat": "Sampler Track", "combo": "[HOLD] + [REC SAMPLE] + button", "action": "Cancel sample recording"}, {"cat": "Song Mode", "combo": "[buttons] + [ALL] + [PAUSE]", "action": "Enter Song mode — cycles NORMAL → SONG → SCENE ★"}, {"cat": "Song Mode", "combo": "Step buttons (in Song mode)", "action": "Add scene (copies previous scene) ★"}, {"cat": "Song Mode", "combo": "[HOLD] + [ALL] + step (in Song mode)", "action": "Delete scene"}, {"cat": "Song Mode", "combo": "[HOLD] + [encoder] (in Song mode)", "action": "Adjust scene length (far left = AUTO: length of longest pattern) ★"}, {"cat": "Song Mode", "combo": "Step + [ALL] + [PAUSE] (while in Song mode)", "action": "Enter Scene mode ★"}, {"cat": "Song Mode", "combo": "Double-tap a scene", "action": "Loop scene; double-tap again to double-loop ★"}, {"cat": "Mixer Mode", "combo": "[ALL] + [MUTE]", "action": "Enter / exit Mixer mode ★"}, {"cat": "Mixer Mode", "combo": "[SOUND] / [TRACK] + [encoder] (4 right knobs)", "action": "Adjust PAN / VOL / REVERB / DELAY per track ★"}, {"cat": "Parameter Lock", "combo": "Hold step button + turn [SOUND] knob", "action": "Create parameter lock — per-step sound change ★"}, {"cat": "Motion Recording", "combo": "[HOLD] + any knob", "action": "Motion recording — lights flash red if param can't be recorded ★"}, {"cat": "Sound Editing", "combo": "[SOUND] page 1 knobs", "action": "Preset/Sample | Pitch/Mono-Poly-Chord | Pan | Volume ★"}, {"cat": "Sound Editing", "combo": "[SOUND] page 2 knobs", "action": "Amp Attack | Amp Decay | Cutoff | Resonance ★"}, {"cat": "Sound Editing", "combo": "Hold [SOUND] 2s", "action": "Enable Advanced Sound Editing (pages 3–5) ★"}, {"cat": "Advanced Editing p.3", "combo": "Knobs (all track types)", "action": "Reverb Send | Delay Send | EQ High Gain | EQ Low Gain"}, {"cat": "Advanced Editing p.4", "combo": "Synth 1/2 + [DX Synth] knobs", "action": "Portamento Time | Arp Type | Arp Gate Time | Arp Speed"}, {"cat": "Advanced Editing p.4", "combo": "Sampler knobs", "action": "Start Point | End Point | Pitch Attack | Pitch Decay"}, {"cat": "Advanced Editing p.5", "combo": "[DX Synth] only", "action": "FM Algorithm | Modulator Amount | Modulator Frequency | Modulator Feedback ★"}, {"cat": "Save Sound", "combo": "[HOLD] + [ALL] + [SOUND] ↓", "action": "Save current sound as Favorite ★"}], "tips": ["Temp Save / Restore (yellow/cyan LEDs): quick snapshot within a session — great for A/B comparing edits without overwriting the project", "Pattern change quantization (PROJECT+ALL+encoder): sets how many measures before a pattern switch takes effect — prevents jarring mid-bar changes", "Substep (HOLD + drum step): divides a single step into finer subdivisions — use for hi-hat rolls or ghost notes within one 16th note ★", "Edit Chord (hold synth step → tap drum keys): change the individual notes of a chord stored in a synth step — polyphonic step editing", "Scene mode vs Song mode: Song = scenes play in sequence (arrangement); Scene = scenes play as loops (live performance). Both accessible from PAUSE", "Loop scene (double-tap): great for live performance — loop a section while preparing the next part, double-tap to extend the loop length", "Probability values: 10 / 23 / 36 / 49 / 61 / 74 / 87 / 100% — set hi-hats to 61–74% for a humanised groove without programming every variation", "Octave range: +2 to −3 — use −2/−3 for deep sub bass, +1/+2 for high arpeggios", "Mixer mode (ALL+MUTE): adjust PAN/VOL/REVERB/DELAY per track using the 4 right encoders — fastest way to balance a mix", "DX Synth FM params (page 5) only after Advanced Sound Editing (hold SOUND 2s) — FM Algorithm changes operator routing topology"]},
{"id": "wooovebox", "name": "Woovebox", "cat": "Groovebox", "color": "#e67e22", "use": "Pocket 16-track groovebox with chord-follow system, step sequencer, Song mode fragments, sampler/vocoder, conditional triggering, and multi-FX", "overview": "Compact 16-track battery-powered groovebox. Hardware: Write/Play touch buttons, Value knob, 16 tactile microswitches with step LEDs, LED screen (8-char top row + 8-char bottom row), MIDI Type A, USB-C, Line In, Headphones/Sync Out, antenna. Tracks: 1/Cd (chord), 2/bS (bass), 3/Ld (lead), 4/Ar (arp), 5/Ki (kick), 6/Sn (snare), 7/hh (hi-hat), 8/Pc (perc), 9–13/A1–A5 (aux), 14/A6 (sampler), 15/A7 (live), 16/A8 (song). Structure: 16 songs → 16 tracks each → 16 patterns each → 16 steps each. Song mode: 99 fragments (Fr.01–Fr.99) each with per-track pattern/mute/automation + DJFX. Sampler: 2 banks × 16 kits (US.01–US.16) × 16 slices (12s max @ 22kHz 16-bit). Track parameter pages: Pttn → GLob → OSc1 → OSc2 → AMPL → FLtr → Pich → Pan → dyna. Song parameter pages: GLob → EFct → Fr.01–Fr.99. Chord-follow transposes all tracks to current chord. Auto-saves on every play press.", "workflow": ["═══ Getting Started ═══", "Boot without touching Write or Play buttons (touch sensitivity calibrated on boot) → drops into Song mode", "Set output volume: hold <kbd>Play</kbd> + turn Value knob. Select song: hold <kbd>Play</kbd> + press 1–16", "Set BPM: enter Song mode (hold <kbd>Value</kbd> + short-press <kbd>16/A8/Song</kbd>) → GLob page (first page on left) → hold <kbd>1/Cd</kbd> + turn Value to set BPM (short-press <kbd>1/Cd</kbd> to read current value without changing it). BPM flows to delay times, LFO rates, and sample time-stretch — everything stays in sync automatically.", "Set root note: in Song mode on GLob page → hold <kbd>2/bS</kbd> + turn Value (short-press to check current value). Default is C. Root affects chord voicings and which notes the scale considers 'legal'.", "Set scale / mode: in Song mode on GLob page → hold <kbd>3/Ld</kbd> + turn Value. Default is major (C major = all white keys). Scale determines which notes are 'legal' across all chord-following tracks. For an out-of-scale note on the chord track, see FrE.C.", "═══ Navigation & Modes ═══", "Switch to a track: hold <kbd>Value</kbd> + short-press 1–13 (tracks Cd–A5); hold <kbd>Value</kbd> + long-press 14–16 (tracks A6–A8). Note: short-press 14/15/16 opens Sampler/Live/Song instead", "Select a patch: switch to track (hold <kbd>Value</kbd> + short-press 1–13) → turn Value knob to scroll to 'Pach' page → hold any category key (Cd–A2) + turn Value to browse — first item undoes last change, last item inits with saw wave", "═══ Step Sequencing ═══", "Program a step: switch to track → short-press <kbd>Value</kbd> to jump to SEq page → press 1–16 to audition note → hold <kbd>Write</kbd> + short-press step to record; hold <kbd>Write</kbd> + short-press existing step to delete", "Edit a step: on SEq page (short-press <kbd>Value</kbd> to get there) → hold step 1–16 until it blinks → press Value knob to cycle params (note / VELo / LEn / ShFt / when / do) → turn Value to change", "Multi-step edit: on SEq page → hold first step until blinking → while holding, press <kbd>Write</kbd> and release step → still holding Write, select other steps → press Value to cycle params → turn Value to change all at once", "Conditional trigger: on SEq page → hold step until blinking → press Value to cycle to 'when' param → turn Value (e.g. 1of4 = fires once every 4 loops). Cycle to 'do' for modification (with dot = silent if condition not met)", "═══ Chord Track ═══", "Set scale follow mode (FLW.C) per track: switch to track (hold <kbd>Value</kbd> + short-press 1–13 for Cd–A5; long-press 14–16 for A6–A8) → turn Value to GLob page → hold <kbd>4/FLW</kbd> + turn Value → modes: <b>off</b> = no adaptation (sequenced notes play exactly as programmed, good for out-of-scale notes); <b>root</b> = always plays root of current chord (ideal for bass); <b>CLS.A</b> = snaps to nearest chord tone (ideal for arps); <b>LGL</b> = restricts to in-key/in-scale notes only (scale follow for live jamming); <b>trS</b> = dynamically transposes to fit the chord (chord-aware improvisation). Live-played notes always conform to scale regardless of FLW.C.", "Add an out-of-scale note (melodic tracks): set track FLW.C to <b>off</b> (GLob page → hold <kbd>4/FLW</kbd> + turn Value → off). Then on SEq page: hold step until blinking → press Value to cycle to 'note' param → turn Value — full MIDI pitch range is accessible including chromatic/out-of-scale pitches. With FLW.C = off, sequenced notes are never snapped to scale.", "Add an out-of-scale chord (chord track via FrE.C): enter Song mode (hold <kbd>Value</kbd> + short-press <kbd>16/A8/Song</kbd>) → GLob page → hold <kbd>4/Ar</kbd> + turn Value to set FrE.C = <b>yes</b> (firmware 2421+). Now chord steps with out-of-scale root notes (e.g. C# in C major) will play back as programmed instead of being snapped to the nearest legal scale note.", "Play &amp; program chords (track 1/Cd): switch to track 1 (hold <kbd>Value</kbd> + short-press <kbd>1/Cd</kbd>) → keys 1–3 and 5–8 play 7 chords from type 1 (lower bank); keys 9–11 and 13–16 play 7 chords from type 2 (upper bank). Change chord type: hold <kbd>4/CdLo</kbd> (lower bank) or <kbd>12/CdHi</kbd> (upper bank) + turn Value — both banks can have different chord types. To program: short-press <kbd>Value</kbd> for SEq page → hold <kbd>Write</kbd> + press step to record current chord", "═══ Song Mode ═══", "Play one pattern then stop (for external recording): enter Song mode (hold <kbd>Value</kbd> + short-press <kbd>16/A8/Song</kbd>) → turn Value right to Fr.01 → hold <kbd>Write</kbd> + short-press tracks to enable → hold <kbd>Write</kbd> + turn Value to set length (match your pattern length) → turn Value right to Fr.02 → leave length at 0 and enable no tracks → screen shows 'End' → playback stops automatically after Fr.01 finishes ★", "Song mode arrangement: enter Song mode (hold <kbd>Value</kbd> + short-press <kbd>16/A8/Song</kbd>) → turn Value right past GLob/EFct until screen reads Fr.01 → hold <kbd>Write</kbd> + short-press tracks to enable per fragment → hold <kbd>Write</kbd> + turn Value to set fragment length", "Edit fragment track settings: in Song mode (hold <kbd>Value</kbd> + short-press <kbd>16/A8</kbd>) on a Fr.xx page → hold a lit (enabled) track button until blinking → press Value to cycle: Pttn# / Behv / CdLk / retr.Pt → turn Value to change", "Fragment DJ FX mode: while on Fr.01–Fr.99, hold <kbd>Value</kbd> + press <kbd>16/A8/Song</kbd> — access filter sweep, gater, drone, buffer FX", "Create song fragments: Enter Song mode (hold <kbd>Value</kbd> + short-press <kbd>16/A8/Song</kbd>) → turn Value right past GLob/EFct until screen reads Fr.01 → hold <kbd>Write</kbd> + turn Value to set fragment length (bar count) → hold <kbd>Write</kbd> + short-press tracks 1–16 to enable them in this fragment → to configure per-track: hold any lit track until blinking → press Value to cycle Pttn# / Behv / CdLk / retr.Pt → turn Value to change. Behv options: play / mute / fade in-out / filter+pitch+gater effects. Context menu (hold Write + short-press Value): insert / clone / delete fragments", "═══ Live Mode ═══", "Live mode scenes: scenes are Live mode's equivalent of Song mode fragments — each scene (1–16) stores which tracks are muted/unmuted plus per-track pattern#, behavior, chord lock, and retrigger settings. The 'Live scene' is your current improvised state; 'programmed scenes 1–16' are saved snapshots. Switch immediately: hold <kbd>Play</kbd> + short-press 1–16. Schedule (waits for current scene to end): hold <kbd>Play</kbd> + long-press 1–16. Edit a scene's per-track settings: hold lit track until blinking → press Value to cycle Pttn# / Behv / CdLk / retr.Pt → turn Value. Use scenes for live transitions and arrangement without a fixed song structure.", "Live mode: enter Live mode (hold <kbd>Value</kbd> + short-press <kbd>15/A7</kbd>) → mute/unmute tracks: hold <kbd>Write</kbd> + press 1–16 → select improvisation track: hold <kbd>Play</kbd> 2s until 'Slct trak', then press track button", "═══ Sampling ═══", "Record sample: enter Sampler (hold <kbd>Value</kbd> + short-press <kbd>14/A6</kbd>) → select kit (hold <kbd>Play</kbd> + short-press 1–16) → turn Value to choose input format → press Play to monitor VU → hold <kbd>Write</kbd> + hold slot 1–16 to record. Apply kit to track: context menu (hold Write + short-press Value) → 'SMPK Pach' → switch to track (hold <kbd>Value</kbd> + short-press/long-press track button) → 'Pste Pach'", "Sample a drum kit: enter Sampler (hold Value + short-press 14/A6) → select kit (hold Play + press 1–16) → select format (turn Value: 44.8 line for drums) → press Play to monitor VU levels → hold <kbd>Write</kbd> + hold a slot 1–16 to record each hit. Edit slice: hold slice until blinking → press Value to cycle St.C/St.F/En.C/En.F/Mode/Warp/Pich. Auto-slice a loop: open context menu (hold <kbd>Write</kbd> + short-press <kbd>Value</kbd>) → select Auto or Even → hold <kbd>Write</kbd> + turn Value to set count 2–16 → long-press <kbd>Value</kbd> to execute. Exit sampler to commit. Apply to track: context menu → SMPK Pach → switch to track (hold Value + short-press/long-press track button) → Pste Pach. Resample own audio: exit sampler, play song, re-enter sampler, context menu → SKiP bacK", "═══ Live Recording ═══", "Live record overdub: switch to track (hold <kbd>Value</kbd> + short-press 1–13) → press <kbd>Play</kbd> to start playback → hold <kbd>Write</kbd> + short-press <kbd>Play</kbd> to enter overdub (count-in then records) → short-press <kbd>Play</kbd> to stop recording. Erase: hold <kbd>Write</kbd> + long-press <kbd>Play</kbd>", "Live record quantized notes: switch to track (hold <kbd>Value</kbd> + short-press 1–13 for Cd–A5; long-press 14–16 for A6–A8) → press Play to start → hold <kbd>Write</kbd> + short-press <kbd>Play</kbd> for overdub (count-in starts on release). Press keys to record — notes snap to nearest step. To toggle auto-quantize during recording: hold <kbd>Write</kbd> + long-press <kbd>Play</kbd>. Punch in/out: hold <kbd>Write</kbd> + short-press <kbd>Play</kbd> twice (erases steps as playhead passes, only after first note). Stop recording: short-press <kbd>Play</kbd>. Post-clean-up: short-press <kbd>Value</kbd> to go to SEq page → open context menu (hold <kbd>Write</kbd> + short-press <kbd>Value</kbd>) → select qant pttn → long-press <kbd>Value</kbd> to execute (destructive snap to grid)", "═══ Pattern & Creative Effects ═══", "Chain patterns: switch to track (hold <kbd>Value</kbd> + short-press track 1–13 / long-press 14–16) → turn Value right to Pttn page → hold <kbd>3/Ch.ne</kbd> + turn Value to set next pattern (SELF = loop back) → hold <kbd>4/Ch.rP</kbd> + turn Value to set repeat count before switching. Quick auto-chain: context menu (hold <kbd>Write</kbd> + short-press <kbd>Value</kbd>) → Chn → hold <kbd>Write</kbd> + turn Value to set N patterns to chain", "Solo a track: first switch to the track you want to solo (hold <kbd>Value</kbd> + short-press for Cd–A5; hold <kbd>Value</kbd> + long-press for A6–A8) → once on that track, hold <kbd>Value</kbd> + short-press the SAME button again → screen shows 'SoLo On'. Repeat gesture to cancel ('SoLo Off'). For A6–A8: hold <kbd>Value</kbd> + long-press the same button again", "Undo: enter Song mode (hold <kbd>Value</kbd> + short-press <kbd>16/A8/Song</kbd>) → turn Value left to GLob page → open context menu (hold <kbd>Write</kbd> + short-press <kbd>Value</kbd>) → find 'Undo' → hold <kbd>Write</kbd> + long-press <kbd>Value</kbd> to execute", "Ear candy &amp; risers: (1) Chord-quantized pitch LFO bells: switch to track → turn Value to Pich page → hold <kbd>1/L1.Md</kbd> + turn Value to Chrd → set L1.Wv + L1.dp + L1.rt. (2) Riser preset: select riser/faller patch on an aux track (Pach page), enable that track in a fragment. (3) DJ FX riser: Song mode → Fr.xx page → hold <kbd>Value</kbd> + press <kbd>16/A8</kbd> for DJ FX → set nois + FL.St/FL.En. (4) Shimmer delay: Song mode → turn Value to EFct page → hold <kbd>4/d2.Al</kbd> + turn Value to spkl; then on each track GLob page set dly2 send. (5) Retrigger fills: Song mode → Fr.xx → hold lit track until blinking → press Value to cycle to retr.Pt → turn Value. (6) Conditional fills: SEq page (short-press <kbd>Value</kbd>) → hold step until blinking → press Value to cycle to 'when' → set 1of4 or 1of8"], "shortcuts": [{"cat": "Navigation", "combo": "Hold [Value] + short-press [1–13]", "action": "Track Mode: switch to track Cd–A5 for editing ★"}, {"cat": "Navigation", "combo": "Hold [Value] + long-press [14–16]", "action": "Track Mode: switch to tracks A6 / A7 / A8 (must long-press — short-press opens Sampler / Live / Song instead) ★"}, {"cat": "Navigation", "combo": "Hold [Value] + short-press [14/A6]", "action": "Sampler Mode: short-press once = Sampler, twice = Vocoder ★"}, {"cat": "Navigation", "combo": "Hold [Value] + short-press [15/A7]", "action": "Live Mode: enter Live mode ★"}, {"cat": "Navigation", "combo": "Hold [Value] + short-press [16/A8]", "action": "Song Mode: enter Song mode ★"}, {"cat": "Navigation", "combo": "Turn [Value] (in any mode)", "action": "Scroll through pages — works in all modes (Track: Seq→Pttn→GLob→Osc1→Osc2→AMPL→FLtr→Pich→dyna→Pach; Song: GLob→EFct→Fr.01–Fr.99; Sampler: select input source; Live: scenes) ★"}, {"cat": "Navigation", "combo": "Short-press [Value] knob", "action": "Jump to Seq page / toggle back to previous page"}, {"cat": "Navigation", "combo": "Hold [Write] + short-press [Value]", "action": "Open context menu (cycle through options) ★"}, {"cat": "Navigation", "combo": "Turn [Value] (context menu open)", "action": "Select sub-item or set parameter"}, {"cat": "Navigation", "combo": "Long-press [Value] (context menu open)", "action": "Action / execute the selected menu item ★"}, {"cat": "Navigation", "combo": "Hold [Write] + onto an aux track", "action": "Use built-in riser/faller patches — enable in a fragment for instant transitions"}, {"cat": "Ear Candy / Risers / Fills", "combo": "FLtr page → Hold [7/C2dc] + turn [Value]", "action": "Open filter → auto-lengthens AEG release: staccato-to-lush buildup trick ★"}, {"cat": "Ear Candy / Risers / Fills", "combo": "FLtr page → Hold [8/C2EF] + turn [Value]", "action": "Open filter → boosts reverb+delay sends: intimate-to-wide sweep ★"}, {"cat": "Ear Candy / Risers / Fills", "combo": "Switch to track → GLob page → hold [10/bt.Cr] + turn [Value]; then OSc1 page → hold [16/SM.Ho] + turn [Value]", "action": "Bit crush + sample rate reduce: lo-fi tape/vinyl texture on any track"}], "tips": ["Track parameter page order: Pttn → GLob → OSc1 → OSc2 → AMPL → FLtr → Pich → Pan → dyna. Short-press Value to jump to SEq; turn Value knob to scroll pages.", "Chord-follow (FLW.C) modes: 'root' on bass = always plays root of chord; 'CLS.A' on arp = nearest chord tone; 'LGL' on lead = in-key only; 'trS' = dynamic transpose for chord-aware improvisation ★", "Prime pattern lengths (3, 5, 7, 11) on the arp create ever-changing polyrhythmic runs; even lengths (4, 8, 16) sound conventional. Mix per-track lengths for automatic variation.", "Conditional 'when' + 'do': 'when'=1of4 fires every 4th loop. 'do' with dot (e.g. SldE.) = silent when condition not met; without dot = plays normally but modified", "Song mode fragments: 99 fragments (Fr.01–Fr.99) per song. Each fragment can select different pattern# per track, mute/play, apply automation, and use DJ FX transitions.", "Fragment DJ FX page (15 params): 1/Mi.St + 2/Mi.En (mix crossfade -127=buf only/+127=synth only), 3/n.V.St + 4/n.V.En (noise vol ramp), 5/Gatr (gater: +Aud or -FLt target), 6/Fl.tG (filter target: MiX/buFF/Synt/noiS), 7/FL.St + 8/FL.En (filter sweep -127=LP/0=off/+127=HP), 9-10/d.V.St+En (drone vol; neg=stereo width), 11-12/d.P.St+En (drone pitch MIDI semitones), 13/b.LEn (buffer length, shared rec+play), 14/b.PLy (FWd/rvS/pin/pon/PrEP × buf 1/2), 15/b.rEc (Sy/Mi/Li × 1/2 + oSy/oMi/oLi overdub) ★", "ADSR envelope per oscillator: AtK (attack ms), dcy (decay ms), SuS (sustain 0–127), rLS (release ms). Each oscillator has independent ADSR + two amplitude LFOs.", "Filter page (FLtr): type = LP/BP/HP; Cut.F = cutoff; rESo = resonance; FEG.d = filter envelope depth; ADSR shapes filter sweep. C2dc links filter cutoff to AEG decay for tension buildups.", "Dynamics page (dyna): per-track sidechain (Sd.dP depth, Sd.Gt gate, Sd.At attack, Sd.rL release) + compressor (CM.Th threshold, CM.rt ratio, CM.At attack, CM.rL release) + noiS noise generator for analog feel", "Song global effects: dual delay units (dLLn length, dLFb feedback, dLwd stereo width), chorus (chSP speed, cht1/cht2 times, ch.AL algorithm), reverb (rvFb feedback, rvtM time), vinyl crackle (Vn.Cr)", "Panning page (Pan): static pan + P.2.Pn pitch-to-stereo spread + auto-pan LFO (Au.Wv/Au.dE/Au.rt/Au.Ho) + start position LFO (St.Wv/St.dE/St.rt/St.Ho)", "Pitch page (Pich): Prt.S portamento speed, LEG.S legato speed, O3.Lv/O3.Oc for Osc3 sub voice, two independent pitch LFOs each with waveform/depth/rate/hold", "Sampler structure: 2 banks × 16 kits × 16 slices. Each slice: 12s max @ 22.05kHz 16-bit or 44.1kHz 8-bit μ-law, with start/end point, play mode, warp mode, pitch tuning.", "BPM is global — changing it auto-adjusts delay times, LFO rates, and sample time-stretch. No tempo drift across tracks.", "Auto-save on every play press — no manual save needed. Battery % shown during save. Hold Play + short-press Value to check battery level anytime.", "GLob page bEhv (Track Behavior) defines per-track playback, UI, functionality, stem rendering, and file management behavior.", "b.div BPM divisor on chord track defaults to 4 — chord track plays at 1/4 speed, giving one chord per bar at standard 4/4 patterns"]},
{"id": "multi_devices", "name": "Multi Device", "cat": "Workflow", "color": "#16a085", "use": "Bidirectional or iterative multi-device composition: sample between devices, arrange, layer, and build songs across hardware", "overview": "Framework for chaining hardware devices via audio routing. Two modes: (1) Bidirectional — create on Device A, sample to Device B, arrange, resample back to A for multi-layer compositions; (2) Iterative — create loops on Device A, sample to Device B, do all arrangement on B (no roundtrip). Enables fast iteration without manual re-recording. Works with any two devices supporting audio in/out and sampling/sequencing. Requires audio cables and BPM sync.", "workflowTitle": "Multi-Device Workflows", "workflow": ["<b>═══ P-6 + Woovebox (Bidirectional) ═══</b>", "<b>Setup (one-time):</b> Connect Woovebox audio out → P-6 line in (for forward sampling). Connect P-6 audio out → Woovebox line in (for reverse sampling). Set both to same BPM: <b>Woovebox</b> — Song mode (hold <kbd>[Value]</kbd> + short-press <kbd>[16/A8]</kbd>) → GLob page → hold <kbd>[1/Cd]</kbd> + turn <kbd>[Value]</kbd> to set BPM. <b>P-6</b> — turn <kbd>[TEMPO/VALUE]</kbd> to set BPM. ★", "<b>Forward: Woovebox → P-6 sample.</b> (1) On Woovebox: create loop via Song mode → enable tracks → press <kbd>[Play]</kbd> to start. (2) On P-6: press <kbd>[SAMPLING]</kbd> → select blinking pad (destination 1–6) → press <kbd>[SAMPLING]</kbd> to start → press <kbd>[SAMPLING]</kbd> to stop. Loop now in pad, ready to sequence.", "<b>Arrange on P-6:</b> Set pattern length — <kbd>[SHIFT]</kbd> + <kbd>[D' LAST]</kbd> → turn <kbd>[TEMPO/VALUE]</kbd> → <kbd>[EXIT]</kbd>. Step input: press pad → press step buttons 1–16 to place hits (lit = active). Duplicate pattern: <kbd>[SHIFT]</kbd> + <kbd>[COPY]</kbd> → <kbd>[VALUE]</kbd> → 'DUPL' → <kbd>[ENTER]</kbd>. Queue next: hold <kbd>[PATTERN]</kbd> + press step (switches at end). Optional: route to effects via <kbd>[MFX]</kbd> + pad to toggle BUS A ↔ BUS EFFECT.", "<b>Reverse: P-6 → Woovebox sample.</b> (1) On P-6: press <kbd>[COPY ►]</kbd> to start pattern playback. (2) On Woovebox: enter Sampler (hold <kbd>[Value]</kbd> + short-press <kbd>[14/A6]</kbd>) → hold <kbd>[Play]</kbd> + short-press 1–16 to select kit → turn <kbd>[Value]</kbd> to choose input format (44.8 line for loops) → press <kbd>[Play]</kbd> to monitor VU → hold <kbd>[Write]</kbd> + hold slot 1–16 to record during P-6 playback → switch to any track to exit and confirm.", "<b>Use re-sampled loop in Woovebox:</b> Apply kit to track — context menu (hold <kbd>[Write]</kbd> + short-press <kbd>[Value]</kbd>) → 'SMPK Pach' → switch to track → 'Pste Pach'. Slices available on SEq page. Program steps: hold <kbd>[Write]</kbd> + short-press step buttons 1–16. Optional: auto-chop for melodic re-sequencing.", "<b>Nested loop workflow:</b> Create initial loop on Woovebox (bass + kick) → sample to P-6 pad 1 → arrange 8-step pattern → sample back to Woovebox track → layer with original tracks. Iterate: add layer on P-6, sample back, add track to Woovebox. Each roundtrip adds depth.", "<b>═══ SmplTrek + Woovebox (Iterative) ═══</b>", "<b>Setup:</b> Connect Woovebox audio out → SmplTrek line in. Set both to same BPM: <b>Woovebox</b> — Song mode → GLob page → hold <kbd>[1/Cd]</kbd> + turn <kbd>[Value]</kbd>. <b>SmplTrek</b> — System menu / scene settings. ★", "<b>Create loop on Woovebox:</b> Sketch melodic/chord loop via Song mode — enable tracks (Cd, bS, Ld, etc.) → set fragment length → hold <kbd>[Write]</kbd> + short-press tracks to enable → press <kbd>[Play]</kbd>. Build 8–16 bar loop.", "<b>Record to SmplTrek:</b> Start Woovebox playback. On SmplTrek: hold a track pad (Loop Track) → select input source → confirm → record duration of loop. Repeat for additional melodic passes.", "<b>Arrange on SmplTrek:</b> Hold Drum Track pad → select drum kit → program drums in step sequencer. Add sidechaining: <kbd>[Mixer]</kbd> → select track → turn knobs for level, pan, send FX. Layer extra melodies: record new Woovebox loops, sample each to separate tracks.", "<b>Iterative workflow:</b> Create new Woovebox loop (verse/chorus/bridge) → Woovebox playback → SmplTrek: hold track pad → quick sample → arrange drums to match → edit effects. Each iteration adds a section; no roundtrip. Export: <kbd>[Mixer]</kbd> → Mixdown → <kbd>[OK]</kbd>.", "<b>Final composition in SmplTrek:</b> Use scenes for song structure (Intro → Verse → Chorus → Bridge → Outro). Press <kbd>[PLAY]</kbd> for full project (auto-advance scenes) or <kbd>[STEP]</kbd> buttons to launch individual scenes live."], "shortcuts": [], "tips": []},

function thPianoSVG(scalePCs, rootPC, color) {
  const N = TH.N;
  const isBlack = [0,1,0,1,0,0,1,0,1,0,1,0];
  const wkNum   = [0,-1,1,-1,2,3,-1,4,-1,5,-1,6]; // white key index in octave
  const bkLeft  = [-1,14.5,-1,40.5,-1,-1,92.5,-1,118.5,-1,144.5,-1]; // px from octave start
  const WW=24, WH=72, WP=26, BW=15, BH=46, OCT=2;
  const totalW = OCT*7*WP;
  let wk='', bk='';
  for (let oct=0; oct<OCT; oct++) {
    const ox = oct*7*WP;
    for (let n=0; n<12; n++) {
      const pc=n, act=scalePCs.has(pc), root=(pc===rootPC);
      if (!isBlack[n]) {
        const x=ox+wkNum[n]*WP;
        const fill=root?color:act?color+'55':'#d0d0d0';
        const lc=act?'#fff':'#666';
        wk+=`<rect x="${x}" y="0" width="${WW}" height="${WH}" fill="${fill}" stroke="#666" stroke-width="1" rx="1"/>`;
        if (n===0) wk+=`<text x="${x+WW/2}" y="${WH-5}" text-anchor="middle" font-size="7" fill="${lc}">${N[0]}${oct+4}</text>`;
      } else {
        const x=(ox+bkLeft[n]).toFixed(1);
        const fill=root?color:act?color+'88':'#1a1a1a';
        bk+=`<rect x="${x}" y="0" width="${BW}" height="${BH}" fill="${fill}" stroke="#000" stroke-width="0.5" rx="1"/>`;
      }
    }
  }
  return `<svg width="${totalW}" height="${WH+2}" viewBox="0 0 ${totalW} ${WH+2}" style="display:block">${wk}${bk}</svg>`;
}

function thCofSVG(selPC, color) {
  const {cofPCs,cofMaj,cofMin,cofSig}=TH;
  const CX=110,CY=110,R1=104,R2=67,R3=38;
  const rad=a=>(a-90)*Math.PI/180;
  const pt=(a,r)=>[(CX+r*Math.cos(rad(a))).toFixed(1),(CY+r*Math.sin(rad(a))).toFixed(1)].join(',');
  const sec=(ac,ro,ri,f)=>{const a1=ac-14.4,a2=ac+14.4;return`<path d="M${pt(a1,ro)} A${ro},${ro} 0 0,1 ${pt(a2,ro)} L${pt(a2,ri)} A${ri},${ri} 0 0,0 ${pt(a1,ri)} Z" fill="${f}" stroke="#111" stroke-width="1.5"/>`;};
  const tx=(a,r,s,sz,f,b)=>{const[x,y]=[CX+r*Math.cos(rad(a)),CY+r*Math.sin(rad(a))];return`<text x="${+x.toFixed(1)}" y="${+y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="${sz}" fill="${f}"${b?' font-weight="700"':''}>${s}</text>`;};
  let o=`<svg width="220" height="220" viewBox="0 0 220 220"><circle cx="${CX}" cy="${CY}" r="${R1+3}" fill="#0d0d0d"/>`;
  for(let i=0;i<12;i++){
    const ac=i*30,pc=cofPCs[i],sel=pc===selPC;
    o+=sec(ac,R1,R2+1,sel?color:'#252525');
    o+=sec(ac,R2-1,R3,sel?color+'44':'#1a1a1a');
    o+=tx(ac,(R1+R2)/2,cofMaj[i],sel?13:10,sel?'#fff':'#aaa',sel);
    o+=tx(ac,(R2+R3)/2,cofMin[i],sel?9:8,sel?'#ddd':'#555',false);
    o+=tx(ac,R3-11,cofSig[i],7,sel?'#fff':'#444',false);
  }
  o+=`<circle cx="${CX}" cy="${CY}" r="${R3-14}" fill="#0d0d0d"/>`;
  o+=`<text x="${CX}" y="${CY-5}" text-anchor="middle" font-size="8" fill="#444">Circle</text>`;
  o+=`<text x="${CX}" y="${CY+5}" text-anchor="middle" font-size="8" fill="#444">of 5ths</text>`;
  return o+`</svg>`;
}

function thGenChords(scaleIntervals, rootPC, filter, showInv) {
  const N=TH.N;
  const scalePCs=new Set(scaleIntervals.map(i=>(rootPC+i)%12));
  const byType={};
  for(const pc of [...scalePCs].sort((a,b)=>a-b)){
    for(const ct of TH.chordTypes){
      if(filter==='triad'&&ct.intervals.length>3)continue;
      if(filter==='7th'&&ct.intervals.length!==4)continue;
      const chordPCs=ct.intervals.map(i=>(pc+i)%12);
      if(!chordPCs.every(cp=>scalePCs.has(cp)))continue;
      const invCount=showInv?ct.intervals.length:1;
      if(!byType[ct.name])byType[ct.name]=[];
      for(let inv=0;inv<invCount;inv++){
        const sz=ct.intervals.length;
        const nns=ct.intervals.map((_,idx)=>N[chordPCs[(idx+inv)%sz]]);
        const slash=inv>0?'/'+N[chordPCs[inv%sz]]:'';
        byType[ct.name].push({
          name:N[pc]+ct.sym+slash,
          inv:['Root','1st','2nd','3rd'][inv],
          notes:nns.join(' '),
          rootPC:pc
        });
      }
    }
  }
  return byType;
}

// ── Note Search Helpers ───────────────────────────────────────────────
const NOTE_MAP=(()=>{const m={};
  [['C',0],['C#',1],['DB',1],['D',2],['D#',3],['EB',3],['E',4],['FB',4],
   ['F',5],['E#',5],['F#',6],['GB',6],['G',7],['G#',8],['AB',8],
   ['A',9],['A#',10],['BB',10],['B',11],['CB',11]].forEach(([n,v])=>m[n]=v);
  return m;
})();

function parseInputNotes(str){
  const pcs=new Set();
  str.toUpperCase().split(/[\s,;\/|]+/).filter(Boolean).forEach(t=>{
    if(NOTE_MAP[t]!==undefined) pcs.add(NOTE_MAP[t]);
  });
  return pcs;
}

function findScalesContaining(inputPCs){
  if(!inputPCs.size) return [];
  const results=[];
  for(let root=0;root<12;root++){
    for(let si=0;si<TH.scales.length;si++){
      const [name,intervals]=TH.scales[si];
      const scalePCs=new Set(intervals.map(i=>(root+i)%12));
      if([...inputPCs].every(pc=>scalePCs.has(pc))){
        results.push({name,root,rootName:TH.N[root],scalePCs,
          exact:inputPCs.size===scalePCs.size,size:scalePCs.size});
      }
    }
  }
  // sort: exact first, then by scale size asc, then name
  results.sort((a,b)=>(b.exact-a.exact)||(a.size-b.size)||a.rootName.localeCompare(b.rootName)||a.name.localeCompare(b.name));
  return results;
}

    <span class="th-lbl" style="margin-left:10px">Scale</span>

      ${TH.scales.map((s,i)=>`<optgroup label="${s[2]}" style="display:none"></optgroup>`).join('')}

    <select id="th-cf" class="th-sel">
      <option value="all">All types</option>
      <option value="triad">Triads only</option>
      <option value="7th">7th chords</option>

      <input type="checkbox" id="th-inv" style="margin-right:4px">Inversions

  panel.querySelector('#th-cof').addEventListener('click',e=>{

    const angleRaw=Math.atan2(my,mx)*180/Math.PI+90;

    }

    const rows=matches.map(m=>{
      const noteStr=[...m.scalePCs].sort((a,b)=>a-b).map(pc=>{

        <span class="ns-name">${m.rootName} ${m.name}</span>
        <span class="ns-notes">${noteStr}</span>${badge}
      </div>`;
    }).join('');

    resEl.innerHTML=`<div style="margin-top:2px;max-height:260px;overflow-y:auto">${rows}</div>`;
  });

  render();
}

<h3 style="margin-top:18px">Sound Design</h3>
<ul class="tips" style="margin-bottom:18px">
  <li><b>FM basics:</b> Carrier = Osc1, Modulator = Osc2. Ratio between them defines timbre — octave ratios = harmonic, inharmonic ratios = metallic/atonal. Carrier waveform barely matters; <em>modulator frequency &amp; amplitude</em> drive everything.</li>
  <li><b>FM timbre movement:</b> Use <kbd>ALFO2</kbd> / <kbd>AEG2</kbd> on modulator amplitude — not PLFO — to evolve FM timbre over time. AEG falling envelope → plucky bass. ALFO2 slow sweep → evolving pad.</li>
  <li><b>Bell / FM lead:</b> FM1 alg + slight coarse detune on Osc2 → classic bell. Keep modulator level ≤ 63 to avoid pitch-reversal distortion.</li>
  <li><b>FM3 algorithm:</b> FM1 result × unmodulated Osc1 = FM + ring mod. Gnarly metallic/formant textures.</li>
  <li><b>Pitch-dependent LFO:</b> On Osc1/2 page, set playback style <kbd>14/A6</kbd> → dig.v (ROMpler mode). Each note pitch gets its own LFO speed → chord = multiple async LFOs → evolving texture. ★</li>
  <li><b>Drone / ambient texture:</b> Pick a dissonant chord (e.g. half-dim 9th = 5 notes) + dig.v mode → 5 independent LFO timings = rich organic chaos.</li>
  <li><b>Global reverb (dark ambient):</b> Song Global FX page → <kbd>13/A5</kbd> Reverb Feedback max + <kbd>14/A6</kbd> Reverb Time max.</li>
